# OAuth 登录配置模板
# 1. 先在 Streamlit Cloud 的 Secrets 页面填入真实值
# 2. 本地开发时修改此文件，但不要提交到 Git（已加入 .gitignore）

# 授权名单：填入你的 GitHub username 或 Google email
# 空列表 = 允许任何人登录（不推荐）
[oauth]
allowed = ["your-github-username", "your-email@gmail.com"]

# GitHub OAuth App
# 注册地址：https://github.com/settings/developers -> OAuth Apps -> New OAuth App
# Authorization callback URL: https://你的app地址.streamlit.app
[oauth.github]
client_id = "your-github-client-id"
client_secret = "your-github-client-secret"
redirect_uri = "https://lyuiqsvrtmnzxhpxf5ulyo.streamlit.app"

# Google OAuth App
# 注册地址：https://console.cloud.google.com/apis/credentials
# Authorized redirect URIs: https://你的app地址.streamlit.app
[oauth.google]
client_id = "your-google-client-id"
client_secret = "your-google-client-secret"
redirect_uri = "https://lyuiqsvrtmnzxhpxf5ulyo.streamlit.app"
